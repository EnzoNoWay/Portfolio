<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Upload Quiz · Portfolio</title>

  <link rel="stylesheet" href="style.css"/>
</head>
<body>

  <nav>
    <a href="index.html" class="nav-logo">
      <div class="folder-icon"></div>
      portfolio
    </a>

    <ul class="nav-links">
      <li><a href="index.html">home</a></li>
      <li><a href="takenquiz.html">Dashboard</a></li>
      <li><a href="upload.html" class="active">upload</a></li>
    </ul>
  </nav>

  <div class="page active">

    <div class="quiz-section-title">
      <h1>upload</h1>
    </div>

    <!-- Quiz Upload Card -->
    <div class="upload-card" data-type="quiz">
      <div class="upload-icon">
        Upload Taken Quiz
      </div>

      <div class="file-input-row">
        <label class="file-input-label">
          <span class="file-btn">Choose File</span>
          <span class="file-name">No file chosen</span>
          <input type="file" class="file-input" accept=".png,.jpg,.jpeg,.gif,.webp"/>
        </label>
        <span class="file-hint">PNG, JPG, GIF, WEBP</span>
      </div>

      <img class="preview-img" src="" alt="Preview"/>

      <div class="upload-form">
        <div class="form-row">
          <div>
            <label>Title *</label>
            <input type="text" class="quiz-title" placeholder="e.g. Quiz" maxlength="60"/>
          </div>
        </div>
        <div class="form-row">
          <div>
            <label>Score</label>
            <input type="number" class="quiz-score" placeholder="e.g. 95" min="0" max="100"/>
          </div>
          <div>
            <label>Date</label>
            <input type="date" class="quiz-date"/>
          </div>
        </div>

        <span class="error-msg">Please enter title before adding.</span>

        <button class="add-btn">Add Quiz</button>
      </div>
    </div>

    <!-- Performance Task Upload Card -->
    <div class="upload-card" data-type="performance-task">

          </div>
        </div>
        <div class="form-row">
          <div>
            <label>Score</label>
            <input type="number" class="quiz-score" placeholder="e.g. 95" min="0" max="100"/>
          </div>
          <div>
            <label>Date</label>
            <input type="date" class="quiz-date"/>

        </div>

        <span class="error-msg">Please enter title before adding.</span>

    </div>

        </label>

          <div>
            <label>Title *</label>
            <input type="text" class="quiz-title" placeholder="e.g. Exam" maxlength="60"/>
