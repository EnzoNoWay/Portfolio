<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Taken Quizzes · Portfolio</title>

  <!-- All styling is in style.css -->
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

  <!-- ==================== NAVIGATION BAR ==================== -->
  <nav>
    <!-- Logo links back to the home page -->
    <a href="index.html" class="nav-logo">
      <div class="folder-icon"></div>
      portfolio
    </a>

    <!-- Navigation links -->
    <ul class="nav-links">
      <!-- Home link - goes back to index.html -->
      <li>
        <a href="index.html">home</a>
      </li>

      <li>
        <a href="takenquiz.html" class="active">taken quiz</a>
      </li>
    </ul>
  </nav>

  <!-- ==================== MAIN PAGE CONTENT ==================== -->
  <div class="page active">


    <div class="quiz-section-title">
      <h1>taken quizzes · upload</h1>
    </div>

    <!-- ==================== UPLOAD CARD ==================== -->

    <div class="upload-card">


      <div class="upload-icon">
        upload a picture of your taken quiz
      </div>


      <div class="file-input-row">
        <label class="file-input-label">
          <span class="file-btn">Choose File</span>

          <span class="file-name" id="file-name-display">No file chosen</span>

          <input type="file" id="file-input" accept=".png,.jpg,.jpeg,.gif,.webp"/>
        </label>
        <span class="file-hint">PNG, JPG, GIF, WEBP</span>
      </div>


      <img id="preview-img" src="" alt="Quiz preview"/>


      <div class="upload-form">
        <div class="form-row">


          <div>
            <label for="quiz-title">Quiz Title *</label>
            <input type="text" id="quiz-title" placeholder="e.g. Midterm Exam" maxlength="60"/>
          </div>


          <div>
            <label for="quiz-score">Score</label>
            <input type="number" id="quiz-score" placeholder="e.g. 95" min="0" max="100"/>
          </div>

        </div>

        <div class="form-row">
          <div>
            <label for="quiz-date">Date</label>
            <input type="date" id="quiz-date"/>
          </div>
        </div>


        <span class="error-msg" id="error-msg">Please enter a quiz title before adding.</span>


        <button class="add-btn" id="add-btn">Add to List</button>
      </div>
    </div>
    <!-- END UPLOAD CARD -->

    <!-- ==================== QUIZ LIST CARD ==================== -->

    <div class="quiz-recent-card">


      <div class="recent-header">
        <h3>recently taken quizzes</h3>

        <span id="quiz-count"></span>
      </div>


      <div class="quiz-list" id="quiz-list"></div>

    </div>
    <!-- END QUIZ LIST CARD -->

  </div>
  <!-- END MAIN PAGE CONTENT -->

  <!-- All JavaScript is in script.js -->
  <script src="script.js"></script>

</body>
</html>
